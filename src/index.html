<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aletheos Stream</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ======================== TITLEBAR ======================== -->
<div class="titlebar" id="titlebar">
  <div class="titlebar-left">
    <div class="logo-mark">
      <svg width="20" height="20" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="17" stroke="currentColor" stroke-width="2.5"/>
        <path d="M13 20 L20 13 L27 20 L20 27 Z" fill="currentColor" opacity="0.9"/>
        <circle cx="20" cy="20" r="4" fill="currentColor"/>
      </svg>
    </div>
    <span class="app-name">ALETHEOS <span class="accent">STREAM</span></span>
  </div>
  <div class="titlebar-controls">
    <button class="win-btn" id="btn-minimize">&#9472;</button>
    <button class="win-btn" id="btn-maximize">&#9723;</button>
    <button class="win-btn close" id="btn-close">&#10005;</button>
  </div>
</div>

<!-- ======================== SIDEBAR ======================== -->
<aside class="sidebar" id="sidebar">
  <nav class="sidebar-nav">
    <button class="nav-btn active" data-view="home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Übersicht</span>
    </button>

    <!-- Anbieter mit Untermenü -->
    <button class="nav-btn has-sub" id="nav-providers-toggle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      <span>Anbieter</span>
      <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="nav-sub" id="nav-sub-providers">
      <!-- wird per JS befüllt -->
    </div>

    <button class="nav-btn" data-view="stream" id="btn-watching" style="display:none">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
      <span>Schaut gerade</span>
    </button>
  </nav>

  <div class="sidebar-bottom">
    <!-- Theme Toggle -->
    <div class="theme-row">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <label class="toggle-switch">
        <input type="checkbox" id="theme-toggle" />
        <span class="toggle-slider"></span>
      </label>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </div>

    <!-- Einstellungen -->
    <button class="sidebar-icon-btn" id="btn-settings" title="Einstellungen">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Einstellungen</span>
    </button>

    <!-- Alle abmelden -->
    <button class="sidebar-icon-btn danger" id="btn-logout-all" title="Von allen Diensten abmelden">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Alle abmelden</span>
    </button>
  </div>
</aside>

<!-- ======================== MAIN ======================== -->
<main class="main-content" id="main-content">

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div class="view-header">
      <h1 class="view-title">Deine <span class="accent">Streaming-Welt</span></h1>
      <p class="view-sub">Wähle einen Anbieter und starte direkt durch.</p>
    </div>
    <div class="providers-grid" id="providers-grid"></div>
  </div>

  <!-- STREAM VIEW -->
  <div class="view" id="view-stream">
    <div class="stream-topbar" id="stream-topbar">
      <button class="back-btn" id="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Zurück
      </button>
      <span class="stream-title-label" id="stream-title">–</span>
      <button class="topbar-btn" id="btn-fullscreen">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        Vollbild
      </button>
      <button class="topbar-btn danger" id="btn-logout-provider">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Abmelden
      </button>
    </div>
    <div class="webview-wrap" id="webview-wrap"></div>

    <!-- Vollbild-Exit-Overlay -->
    <div class="fullscreen-exit" id="fullscreen-exit" title="Vollbild beenden">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="8 3 3 3 3 8"/><polyline points="21 8 21 3 16 3"/><polyline points="3 16 3 21 8 21"/><polyline points="16 21 21 21 21 16"/></svg>
    </div>
  </div>

</main>

<!-- ======================== SETTINGS PANEL ======================== -->
<div class="settings-overlay" id="settings-overlay"></div>
<div class="settings-panel" id="settings-panel">
  <div class="settings-header">
    <span>Einstellungen</span>
    <button class="settings-close" id="settings-close">✕</button>
  </div>

  <div class="settings-section">
    <label class="settings-label">App-Hintergrund</label>
    <div class="color-row">
      <input type="color" id="set-app-bg-color" value="#0a0a0f" />
      <input type="text" class="color-text" id="set-app-bg-text" placeholder="#0a0a0f" maxlength="7" />
      <button class="reset-btn" data-reset="appBg">↺</button>
    </div>
  </div>

  <div class="settings-section">
    <label class="settings-label">Karten-Hintergrund</label>
    <div class="color-row">
      <input type="color" id="set-card-bg-color" value="#18181f" />
      <input type="text" class="color-text" id="set-card-bg-text" placeholder="#18181f" maxlength="7" />
      <button class="reset-btn" data-reset="cardBg">↺</button>
    </div>
  </div>

  <div class="settings-section">
    <label class="settings-label">Akzentfarbe</label>
    <div class="color-row">
      <input type="color" id="set-accent-color" value="#7c6cff" />
      <input type="text" class="color-text" id="set-accent-text" placeholder="#7c6cff" maxlength="7" />
      <button class="reset-btn" data-reset="accentColor">↺</button>
    </div>
  </div>

  <button class="settings-save-btn" id="settings-save">Speichern</button>
</div>

<!-- ======================== LOADING ======================== -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-ring"></div>
  <span id="loading-text">Wird geladen…</span>
</div>

<script src="js/app.js"></script>
</body>
</html>
