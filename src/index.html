<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aletheos Stream</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Custom Titlebar -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-drag">
      <div class="logo-mark">
        <svg width="22" height="22" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2.5"/>
          <path d="M13 20 L20 13 L27 20 L20 27 Z" fill="currentColor" opacity="0.9"/>
          <circle cx="20" cy="20" r="4" fill="currentColor"/>
        </svg>
      </div>
      <span class="app-name">ALETHEOS <span class="app-name-accent">STREAM</span></span>
    </div>
    <div class="titlebar-controls">
      <button class="win-btn minimize" id="btn-minimize" title="Minimieren">&#9472;</button>
      <button class="win-btn maximize" id="btn-maximize" title="Maximieren">&#9723;</button>
      <button class="win-btn close" id="btn-close" title="Schließen">&#10005;</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <button class="nav-btn active" data-view="home" title="Übersicht">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-view="stream" title="Läuft gerade" id="btn-watching">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        <span>Schauen</span>
      </button>
    </nav>

    <div class="sidebar-bottom">
      <!-- Dark/Light Toggle -->
      <div class="theme-toggle-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <label class="toggle-switch" title="Dark/Light Modus">
          <input type="checkbox" id="theme-toggle" />
          <span class="toggle-slider"></span>
        </label>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content" id="main-content">

    <!-- HOME VIEW -->
    <div class="view active" id="view-home">
      <div class="view-header">
        <h1 class="view-title">Deine <span class="accent">Streaming-Welt</span></h1>
        <p class="view-subtitle">Wähle einen Anbieter und starte direkt durch.</p>
      </div>

      <div class="providers-grid" id="providers-grid">

        <!-- Netflix -->
        <div class="provider-card" data-id="netflix" data-url="https://www.netflix.com">
          <div class="provider-bg" style="--card-color: #E50914;"></div>
          <div class="provider-logo">
            <svg viewBox="0 0 111 30" fill="currentColor" height="32">
              <path d="M105.062 14.28L111 30c-1.75-.25-3.499-.563-5.28-.845l-3.345-8.686-3.437 7.969c-1.687-.282-3.344-.376-5.031-.595l6.031-13.75L94.468 0h5.063l3.062 7.874L105.875 0h5.124l-5.937 14.28zM90.47 0h-4.594v27.25c1.5.094 3.062.156 4.594.343V0zm-8.937 26.937c-4.187-.281-8.375-.53-12.656-.625V0h4.595v21.875c2.75.062 5.5.281 8.061.438v4.624zM64.25 10.657v4.594h-6.406V26H53.22V0h13.125v4.657H57.844v6h6.406zM44.7 26.25c-1.719 0-3.469-.094-5.188-.156V4.657H34.45V0h15.344v4.657H44.7V26.25zM23.044 5.688L16.5 26.937c-1.532-.062-3.063-.094-4.594-.094l-6.75-21.156v21.25H.5V0h6.313l6.843 21.563L19.5 0H26v26.937c-1-.031-1.969-.094-2.956-.094V5.688z"/>
            </svg>
          </div>
          <div class="provider-info">
            <span class="provider-name">Netflix</span>
            <span class="provider-tag">Filme & Serien</span>
          </div>
          <div class="provider-arrow">→</div>
        </div>

        <!-- Prime Video -->
        <div class="provider-card" data-id="prime" data-url="https://www.primevideo.com">
          <div class="provider-bg" style="--card-color: #00A8E1;"></div>
          <div class="provider-logo prime-logo">
            <svg viewBox="0 0 122 37" fill="currentColor" height="28">
              <path d="M74.102 28.226c-7.038 4.816-17.244 7.383-26.033 7.383-12.311 0-23.396-4.55-31.793-12.124-.66-.597-.07-1.41.722-.946 9.054 5.266 20.252 8.438 31.829 8.438 7.804 0 16.39-1.617 24.296-4.97.593-.253 1.09.39.979.22zM76.884 25.045c-.897-1.149-5.944-.544-8.21-.274-.689.084-.795-.516-.174-.95 4.022-2.826 10.617-2.01 11.38-1.063.769.951-.2 7.545-3.975 10.694-.58.486-1.133.228-.876-.414.848-2.115 2.753-6.845 1.855-7.993z"/>
              <path d="M61.588 4.114V1.28A.286.286 0 0161.87.998h14.33a.288.288 0 01.287.288v2.428c-.003.161-.14.372-.387.706l-7.427 10.604c2.761-.067 5.677.346 8.18 1.757.564.317.717.78.76 1.238v3.007c0 .465-.512 1.006-1.05.726-4.388-2.302-10.213-2.554-15.066.027-.495.264-1.012-.27-1.012-.735v-2.858c0-.52.007-1.408.527-2.198l8.603-12.334H61.87a.287.287 0 01-.282-.286zM22.05 22.452h-3.552a.292.292 0 01-.277-.26V1.323c0-.162.134-.291.3-.291h3.311c.162.007.29.14.296.305v2.741h.064c.865-2.34 2.49-3.432 4.684-3.432 2.228 0 3.623 1.092 4.622 3.432.864-2.34 2.828-3.432 4.927-3.432 1.496 0 3.13.616 4.13 2 1.129 1.538.899 3.772.899 5.734l-.004 13.776a.293.293 0 01-.299.296h-3.548a.292.292 0 01-.278-.296V11.268c0-.77.07-2.69-.1-3.42-.267-1.23-1.065-1.577-2.097-1.577-.865 0-1.765.578-2.13 1.503-.366.924-.33 2.462-.33 3.494v10.916a.293.293 0 01-.3.296h-3.548a.292.292 0 01-.276-.296L28.353 11.27c0-.77.133-2.705-.1-3.42-.267-1.23-1.032-1.577-2.097-1.577-.898 0-1.766.578-2.13 1.503-.365.924-.33 2.462-.33 3.494v10.916c0 .162-.137.291-.3.291l-.346-.025zM97.12 0c6.328 0 9.752 5.433 9.752 12.34 0 6.676-3.787 11.97-9.752 11.97-6.196 0-9.586-5.434-9.586-12.202C87.534 5.302 90.959 0 97.12 0zm.037 4.29c-3.13 0-3.326 4.263-3.326 6.92 0 2.66-.04 8.344 3.289 8.344 3.294 0 3.453-4.587 3.453-7.384 0-1.843-.073-4.04-.664-5.769-.511-1.5-1.527-2.11-2.752-2.11zM113.26 22.452h-3.538a.292.292 0 01-.278-.296L109.44 1.28c.027-.148.155-.26.305-.26h3.293c.14.006.258.1.281.236v3.264h.065c.997-2.616 2.393-3.867 4.853-3.867 1.597 0 3.155.578 4.156 2.154 1.03 1.46.998 3.926.998 5.695v13.96a.293.293 0 01-.306.282h-3.56a.291.291 0 01-.267-.282V10.856c0-.77.09-3.08-.1-3.81-.263-1.23-1.03-1.538-2.063-1.538-.863 0-1.73.578-2.127 1.503-.498.925-.566 2.463-.566 3.495v11.65a.294.294 0 01-.302.296h-.14zM53.906 12.955c0 1.766.047 3.24-.852 4.814-.725 1.27-1.883 2.054-3.16 2.054-1.752 0-2.778-1.336-2.778-3.31 0-3.893 3.49-4.599 6.79-4.599v1.04zm4.604 11.13a.955.955 0 01-1.083.108c-1.52-1.265-1.793-1.851-2.63-3.054-2.513 2.566-4.296 3.333-7.548 3.333-3.856 0-6.857-2.38-6.857-7.138 0-3.717 2.012-6.242 4.883-7.477 2.486-1.09 5.957-1.285 8.605-1.587v-.592c0-1.09.085-2.377-.556-3.319-.558-.844-1.627-1.194-2.573-1.194-1.748 0-3.306.896-3.686 2.753-.079.412-.382.82-.794.84l-3.444-.37c-.364-.082-.773-.379-.666-.94C42.653 1.42 46.697 0 50.323 0c1.854 0 4.277.493 5.737 1.895 1.854 1.73 1.676 4.037 1.676 6.548v5.933c0 1.785.74 2.567 1.435 3.527.243.34.298.748-.014 1.003l-2.647 2.18z"/>
            </svg>
            <span class="prime-sub">prime video</span>
          </div>
          <div class="provider-info">
            <span class="provider-name">Prime Video</span>
            <span class="provider-tag">Amazon Originals</span>
          </div>
          <div class="provider-arrow">→</div>
        </div>

        <!-- Disney+ -->
        <div class="provider-card" data-id="disney" data-url="https://www.disneyplus.com">
          <div class="provider-bg" style="--card-color: #113CCF;"></div>
          <div class="provider-logo">
            <svg viewBox="0 0 100 40" fill="white" height="36">
              <text x="5" y="30" font-family="serif" font-size="28" font-weight="bold" fill="white">Disney+</text>
            </svg>
          </div>
          <div class="provider-info">
            <span class="provider-name">Disney+</span>
            <span class="provider-tag">Marvel, Star Wars & mehr</span>
          </div>
          <div class="provider-arrow">→</div>
        </div>

        <!-- Crunchyroll -->
        <div class="provider-card" data-id="crunchyroll" data-url="https://www.crunchyroll.com">
          <div class="provider-bg" style="--card-color: #F47521;"></div>
          <div class="provider-logo">
            <svg viewBox="0 0 200 60" height="34" fill="white">
              <text x="5" y="42" font-family="sans-serif" font-size="36" font-weight="900" fill="white">crunchyroll</text>
            </svg>
          </div>
          <div class="provider-info">
            <span class="provider-name">Crunchyroll</span>
            <span class="provider-tag">Anime & Manga</span>
          </div>
          <div class="provider-arrow">→</div>
        </div>

        <!-- BurningSeries -->
        <div class="provider-card" data-id="burning" data-url="https://burningseries.to">
          <div class="provider-bg" style="--card-color: #C0392B;"></div>
          <div class="provider-logo">
            <svg viewBox="0 0 60 60" height="36" fill="none">
              <path d="M30 5 C20 5 10 15 12 28 C14 38 22 45 30 50 C38 45 46 38 48 28 C50 15 40 5 30 5Z" fill="#C0392B"/>
              <path d="M30 18 C26 22 24 28 28 32 C32 36 36 30 34 25 C32 22 30 20 30 18Z" fill="white" opacity="0.9"/>
              <text x="15" y="58" font-family="sans-serif" font-size="9" fill="white" font-weight="700">BurningSeries</text>
            </svg>
          </div>
          <div class="provider-info">
            <span class="provider-name">BurningSeries</span>
            <span class="provider-tag">Serien & Anime</span>
          </div>
          <div class="provider-arrow">→</div>
        </div>

        <!-- Cine.to -->
        <div class="provider-card" data-id="cineto" data-url="https://cine.to">
          <div class="provider-bg" style="--card-color: #8B5CF6;"></div>
          <div class="provider-logo">
            <svg viewBox="0 0 120 50" height="32" fill="white">
              <text x="5" y="38" font-family="sans-serif" font-size="38" font-weight="900" letter-spacing="-2" fill="white">cine.to</text>
            </svg>
          </div>
          <div class="provider-info">
            <span class="provider-name">Cine.to</span>
            <span class="provider-tag">Filme & Serien</span>
          </div>
          <div class="provider-arrow">→</div>
        </div>

      </div>
    </div>

    <!-- STREAM VIEW -->
    <div class="view" id="view-stream">
      <div class="stream-header" id="stream-header">
        <button class="back-btn" id="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Zurück
        </button>
        <span class="stream-title" id="stream-title">Provider</span>
        <button class="logout-btn" id="logout-btn" title="Sitzung beenden">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Abmelden
        </button>
      </div>
      <div class="webview-wrap" id="webview-wrap">
        <!-- Webview wird per JS eingefügt -->
      </div>
    </div>

  </main>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
    <span class="loading-text" id="loading-text">Wird geladen…</span>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
