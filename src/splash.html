<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      width:420px;height:280px;overflow:hidden;
      background:linear-gradient(135deg,#0a0a0f 0%,#111118 60%,#0d1520 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family:'Segoe UI',system-ui,sans-serif;
      -webkit-app-region:none;user-select:none;
    }
    .logo-wrap{position:relative;margin-bottom:20px}
    .logo-ring{
      width:90px;height:90px;border-radius:50%;
      border:2px solid rgba(48,197,187,.2);
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      animation:ringPulse 2s ease-in-out infinite;
    }
    .logo-ring:nth-child(2){animation-delay:.5s;border-color:rgba(48,197,187,.1);width:110px;height:110px}
    .logo-icon{
      width:72px;height:72px;border-radius:50%;
      background:rgba(48,197,187,.12);
      border:2px solid rgba(48,197,187,.4);
      display:flex;align-items:center;justify-content:center;
      position:relative;z-index:1;
      animation:iconPop .6s cubic-bezier(.34,1.56,.64,1) forwards;
      opacity:0;transform:scale(.4);
    }
    .logo-icon img{width:42px;height:42px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(48,197,187,.6))}
    .app-name{
      font-size:22px;font-weight:700;letter-spacing:.2em;
      color:#f0f0f8;margin-bottom:6px;
      animation:fadeUp .5s ease .4s forwards;opacity:0;transform:translateY(10px);
    }
    .app-name span{color:#30c5bb}
    .tagline{
      font-size:11px;color:rgba(240,240,248,.4);letter-spacing:.1em;
      animation:fadeUp .5s ease .55s forwards;opacity:0;transform:translateY(8px);
      margin-bottom:28px;
    }
    .progress-wrap{
      width:180px;height:3px;background:rgba(255,255,255,.08);
      border-radius:999px;overflow:hidden;
      animation:fadeUp .4s ease .7s forwards;opacity:0;
    }
    .progress-bar{
      height:100%;width:0%;background:linear-gradient(90deg,#30c5bb,#6ee7df);
      border-radius:999px;
      animation:progressAnim 2s ease .8s forwards;
    }
    .version{
      font-size:10px;color:rgba(240,240,248,.2);margin-top:14px;letter-spacing:.06em;
      animation:fadeUp .4s ease .9s forwards;opacity:0;
    }
    @keyframes ringPulse{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:.8;transform:translate(-50%,-50%) scale(1.06)}}
    @keyframes iconPop{to{opacity:1;transform:scale(1)}}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
    @keyframes progressAnim{0%{width:0%}40%{width:35%}70%{width:65%}85%{width:80%}100%{width:95%}}
  </style>
</head>
<body>
  <div class="logo-wrap">
    <div class="logo-ring"></div>
    <div class="logo-ring"></div>
    <div class="logo-icon">
      <img src="assets/icon.png" alt="OmniSight" onerror="this.style.display='none';this.parentElement.innerHTML='🎬'"/>
    </div>
  </div>
  <div class="app-name">OMNI<span>SIGHT</span></div>
  <div class="tagline">Dein zentrales Streaming-Hub</div>
  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>
  <div class="version">v3.1.10</div>
</body>
</html>
