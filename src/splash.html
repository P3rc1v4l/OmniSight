<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif}
.wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.logo-ring{position:relative;width:90px;height:90px}
.ring{position:absolute;inset:0;border-radius:50%;border:2.5px solid transparent}
.ring1{border-top-color:#30c5bb;border-right-color:#30c5bb;animation:spin 1.2s linear infinite}
.ring2{inset:10px;border-bottom-color:#30c5bb55;border-left-color:#30c5bb55;animation:spin 1.8s linear infinite reverse}
.logo-img{position:absolute;inset:18px;border-radius:50%;object-fit:contain;background:transparent;mix-blend-mode:screen}
@keyframes spin{to{transform:rotate(360deg)}}
.app-name{font-size:22px;font-weight:800;letter-spacing:.2em;color:#f0f0f8}
.app-name span{color:#30c5bb}
.bar-wrap{width:180px;height:3px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.bar{height:100%;background:#30c5bb;border-radius:999px;animation:load 2.3s ease forwards}
@keyframes load{0%{width:0%}60%{width:70%}100%{width:100%}}
.sub{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.1em}
</style>
</head><body>
<div class="wrap">
  <div class="logo-ring">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <img class="logo-img" src="assets/icon.png" alt=""/>
  </div>
  <div class="app-name">OMNI<span>SIGHT</span></div>
  <div class="bar-wrap"><div class="bar"></div></div>
  <div class="sub">Streaming Hub wird geladen…</div>
</div>
</body></html>
