<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:'Segoe UI',system-ui,sans-serif;-webkit-app-region:drag}
    .splash-container{display:flex;flex-direction:column;align-items:center;gap:24px;animation:fadeIn .6s ease forwards}
    @keyframes fadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    .logo-wrap{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center}
    .logo-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;animation:spin 2s linear infinite}
    .logo-ring.r1{border-top-color:#30c5bb;border-right-color:rgba(48,197,187,.3)}
    .logo-ring.r2{position:absolute;inset:8px;border-top-color:rgba(48,197,187,.5);border-left-color:rgba(48,197,187,.2);animation:spinr 1.5s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes spinr{to{transform:rotate(-360deg)}}
    .logo-img{width:80px;height:80px;object-fit:contain;mix-blend-mode:screen;z-index:2;position:relative;animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{filter:drop-shadow(0 0 8px rgba(48,197,187,.6))}50%{filter:drop-shadow(0 0 20px rgba(48,197,187,.9))}}
    .app-name{font-size:28px;font-weight:700;letter-spacing:.2em;color:#f0f0f8;text-transform:uppercase}
    .app-name span{color:#30c5bb}
    .tagline{font-size:12px;color:rgba(240,240,248,.3);letter-spacing:.3em;text-transform:uppercase}
    .progress-wrap{width:200px;height:2px;background:rgba(48,197,187,.15);border-radius:999px;overflow:hidden;margin-top:8px}
    .progress-bar{height:100%;background:linear-gradient(to right,#30c5bb,#5de8e0);border-radius:999px;width:0;animation:progress 2.2s ease forwards}
    @keyframes progress{0%{width:0}60%{width:70%}100%{width:100%}}
    /* Partikel-Hintergrund */
    canvas{position:fixed;inset:0;z-index:0}
    .splash-container{z-index:1}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="splash-container">
  <div class="logo-wrap">
    <div class="logo-ring r1"></div>
    <div class="logo-ring r2"></div>
    <img class="logo-img" src="assets/icon.png" alt="OmniSight"/>
  </div>
  <div>
    <div class="app-name">OMNI<span>SIGHT</span></div>
    <div class="tagline" style="text-align:center;margin-top:4px">Dein Streaming-Hub</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let w=canvas.width=window.innerWidth,h=canvas.height=window.innerHeight;
const pts=Array.from({length:40},()=>({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,op:Math.random()*.4+.05}));
function tick(){
  ctx.clearRect(0,0,w,h);
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(48,197,187,${p.op})`;ctx.fill();
  });requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
