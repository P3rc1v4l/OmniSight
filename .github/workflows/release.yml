name: Release

# Manuell (Button "Run workflow") ODER automatisch beim Tag v*
on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Nur Entwurf statt veröffentlichtem Release?'
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # KEIN npm-Cache: der bräuchte eine package-lock.json im Repo.

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Versionsnummer aus package.json lesen
        id: version
        shell: bash
        run: echo "v=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Abhängigkeiten installieren
        # npm install statt npm ci: erzeugt die Lock-Datei selbst auf dem Runner,
        # es muss also KEINE package-lock.json im Repo liegen.
        run: npm install

      - name: Build + Release erstellen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Für signierte Auto-Updates: müssen als GitHub-Secrets hinterlegt sein.
          # tauri-action signiert damit die Update-Artefakte und erzeugt latest.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Tag-Push -> der gepushte Tag (z.B. v0.2.0).
          # Manueller Start -> Version aus package.json (z.B. v0.2.0).
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.version.outputs.v) }}
          releaseName: ${{ github.ref_type == 'tag' && format('OmniSight {0}', github.ref_name) || format('OmniSight v{0}', steps.version.outputs.v) }}
          releaseBody: 'Automatisch erstellter Release. Siehe CHANGELOG.md.'
          # Standard: false -> sofort veröffentlichter Release.
          # Nur wenn du beim manuellen Start "draft" anhakst -> Entwurf.
          releaseDraft: ${{ inputs.draft == true }}
          prerelease: false
          args: ${{ matrix.args }}
