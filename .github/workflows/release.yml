name: Release

# Manuell (Button "Run workflow") ODER automatisch beim Tag v*
on:
  workflow_dispatch:
    inputs:
      draft:
        description: 'Nur Entwurf statt veröffentlichtem Release?'
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

jobs:
  check:
    name: Typen prüfen (svelte-check)
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Abhängigkeiten installieren
        run: npm install
      - name: svelte-check (Typfehler abfangen, bevor gebaut wird)
        run: npm run check
      - name: Vitest (kritische Logik – Krypto/Hashing, Parser, Auth-Kern)
        run: npm test

  build-tauri:
    needs: check
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # KEIN npm-Cache: der bräuchte eine package-lock.json im Repo.

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Versionsnummer aus package.json lesen
        id: version
        shell: bash
        run: echo "v=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Abhängigkeiten installieren
        # npm install statt npm ci: erzeugt die Lock-Datei selbst auf dem Runner,
        # es muss also KEINE package-lock.json im Repo liegen.
        run: npm install

      - name: uBlock Origin für Werbeblocker holen
        # Holt die neueste uBlock-Origin-Erweiterung (entpackt) nach src-tauri/extensions/.
        # Wird als Ressource gebündelt und vom Stream-Fenster geladen, wenn der
        # Werbeblocker-Schalter eines Anbieters an ist. Ausfallsicher.
        continue-on-error: true
        shell: pwsh
        run: |
          $rel = Invoke-RestMethod -Uri 'https://api.github.com/repos/gorhill/uBlock/releases/latest' -Headers @{ 'User-Agent' = 'omnisight-ci' }
          Write-Host "uBlock Origin Version: $($rel.tag_name)"
          $asset = $rel.assets | Where-Object { $_.name -like '*.chromium.zip' } | Select-Object -First 1
          if (-not $asset) { throw 'Kein .chromium.zip-Asset im Release gefunden' }
          Write-Host "Lade: $($asset.browser_download_url)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile ublock.zip -Headers @{ 'User-Agent' = 'omnisight-ci' }
          New-Item -ItemType Directory -Force -Path src-tauri/extensions | Out-Null
          Expand-Archive -Path ublock.zip -DestinationPath src-tauri/extensions -Force
          Get-ChildItem src-tauri/extensions
          if (Test-Path 'src-tauri/extensions/uBlock0.chromium/manifest.json') {
            Write-Host 'OK: uBlock0.chromium/manifest.json vorhanden'
          } else {
            Write-Host 'WARNUNG: manifest.json nicht gefunden – Ordnerstruktur prüfen'
          }

      - name: BetterTTV (nur Twitch) + Twitch-Erweiterungsordner
        # Eigener Ordner extensions_twitch/, der NUR fürs Twitch-Fenster geladen wird:
        # enthält BetterTTV und (für Werbeblockung auf Twitch) eine Kopie von uBlock.
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/extensions_twitch | Out-Null
          if (Test-Path 'src-tauri/extensions/uBlock0.chromium') {
            Copy-Item -Recurse -Force 'src-tauri/extensions/uBlock0.chromium' 'src-tauri/extensions_twitch/uBlock0.chromium'
          }
          $rel = Invoke-RestMethod -Uri 'https://api.github.com/repos/night/BetterTTV/releases/latest' -Headers @{ 'User-Agent' = 'omnisight-ci' }
          Write-Host "BetterTTV Version: $($rel.tag_name)"
          $asset = $rel.assets | Where-Object { $_.name -match '(?i)chrome' -and $_.name -like '*.zip' } | Select-Object -First 1
          if ($asset) {
            Write-Host "Lade: $($asset.browser_download_url)"
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile bttv.zip -Headers @{ 'User-Agent' = 'omnisight-ci' }
            New-Item -ItemType Directory -Force -Path src-tauri/extensions_twitch/betterttv | Out-Null
            Expand-Archive -Path bttv.zip -DestinationPath src-tauri/extensions_twitch/betterttv -Force
          } else {
            Write-Host 'WARNUNG: kein Chrome-.zip-Asset bei BetterTTV gefunden – Twitch bekommt vorerst nur uBlock.'
          }
          Get-ChildItem -Recurse -Depth 1 src-tauri/extensions_twitch

      - name: Build + Release erstellen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signiert die Updater-Artefakte (.sig). Schlüssel NUR als Secret, nie im Code.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # TMDB-Key kommt zur Build-Zeit aus dem Secret (nie im Quellcode).
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        with:
          # Repo ist public -> Release + latest.json direkt hier, ohne Login abrufbar.
          # Tag-Push -> der gepushte Tag (z.B. v1.0.4).
          # Manueller Start -> Version aus package.json (z.B. v1.0.4).
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.version.outputs.v) }}
          releaseName: ${{ github.ref_type == 'tag' && format('OmniSight {0}', github.ref_name) || format('OmniSight v{0}', steps.version.outputs.v) }}
          releaseBody: 'Automatisch erstellter Release. Siehe CHANGELOG.md.'
          releaseDraft: ${{ inputs.draft == true }}
          prerelease: false
          args: ${{ matrix.args }}
