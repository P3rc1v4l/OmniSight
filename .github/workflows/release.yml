name: Release

# Laut Vorgabe: manuell ODER automatisch beim Tag v*
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Build + Release erstellen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OmniHub ${{ github.ref_name }}'
          releaseBody: 'Automatisch erstellter Release. Siehe CHANGELOG.md.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
