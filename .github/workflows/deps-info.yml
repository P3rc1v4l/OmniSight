name: Abhängigkeits-Infos

# Manuell über Actions -> "Abhängigkeits-Infos" -> "Run workflow" starten.
# Erzeugt eine Cargo.lock, zeigt die Versionen von webview2-com und windows
# im Log und stellt die Cargo.lock als Download (Artifact) bereit.
on:
  workflow_dispatch:

jobs:
  deps:
    runs-on: windows-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo.lock erzeugen + Versionen anzeigen
        shell: bash
        working-directory: ./src-tauri
        run: |
          cargo generate-lockfile
          echo "================ webview2-com ================"
          cargo tree -i webview2-com || echo "(webview2-com nicht im Baum)"
          echo "================ windows ================"
          cargo tree -i windows || echo "(windows nicht im Baum)"
          echo "================ windows-core ================"
          cargo tree -i windows-core || echo "(windows-core nicht im Baum)"
          echo "================ wry ================"
          cargo tree -i wry || echo "(wry nicht im Baum)"

      - name: Cargo.lock als Download bereitstellen
        uses: actions/upload-artifact@v7
        with:
          name: Cargo-lock
          path: src-tauri/Cargo.lock
