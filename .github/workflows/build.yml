# ═══════════════════════════════════════════════════════════════════
# OmniHub – GitHub Actions Build & Release  v0.3.2
# ─────────────────────────────────────────────────────────────────
# Speed-Optimierungen:
#   1. sccache  → cached einzelne Compilation Units (~50-70% schneller)
#   2. Cargo.lock  → wird generiert & gecacht → stabile Cache-Keys
#   3. Swatinem/rust-cache  → cached ~/.cargo/registry (Dependencies)
# ─────────────────────────────────────────────────────────────────
# Erster Build:   ~10-12 Min (alles neu kompiliert + gecacht)
# Folge-Builds:   ~3-5 Min   (Cache-Hits auf Dependencies + sccache)
# ═══════════════════════════════════════════════════════════════════

name: Build & Release OmniHub

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'GitHub-Release erstellen?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"

jobs:
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. sccache einrichten (cached Compiler-Output) ─────────────
      - name: sccache einrichten
        uses: mozilla-actions/sccache-action@v0.0.9

      # ── 3. Node.js (kein npm-cache – kein package-lock.json) ────────
      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 4. Rust stable ──────────────────────────────────────────────
      - name: Rust stable installieren
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 5. Cargo.lock generieren (Voraussetzung für stabilen Cache) ─
      - name: Cargo.lock generieren
        working-directory: src-tauri
        run: cargo generate-lockfile

      # ── 6. Rust-Cache (cached ~/.cargo/registry + target) ───────────
      #       Läuft NACH Cargo.lock-Generierung für stabilen Cache-Key
      - name: Rust-Cache (Abhängigkeiten)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          # Nur Dependencies cachen, nicht den eigenen Code
          # → sccache übernimmt das Cachen des eigenen Codes
          cache-targets: false

      # ── 7. Node-Abhängigkeiten ──────────────────────────────────────
      - name: Node-Abhängigkeiten installieren
        run: npm install

      # ── 8. Version auslesen ─────────────────────────────────────────
      - name: Version auslesen
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Baue OmniHub v$ver..."

      # ── 9. Tauri Build + Release ────────────────────────────────────
      - name: Tauri Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY:  ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          RUSTC_WRAPPER:      sccache
        with:
          tagName:        v${{ steps.version.outputs.version }}
          releaseName:    'OmniHub v${{ steps.version.outputs.version }}'
          releaseBody:    |
            ## OmniHub v${{ steps.version.outputs.version }}

            ### 📥 Installation
            Lade die `.exe` herunter und führe den Installer aus.
            WideVine ist durch Edge WebView bereits eingebaut – kein Setup nötig!

            ### 💬 Support & Feedback
            - [Discord-Server](https://discord.gg/tnfgta33uj)
            - [GitHub Issues](https://github.com/P3rc1v4l/OmniHub/issues)
          releaseDraft:   false
          prerelease:     false
          includeUpdaterJson: true
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'

      # ── 10. sccache Statistiken anzeigen ───────────────────────────
      - name: sccache Statistiken
        run: sccache --show-stats
        if: always()

      # ── 11. Nur Artefakt (kein Release) ────────────────────────────
      - name: Artefakt hochladen (kein Release)
        if: github.event.inputs.create_release == 'false' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: OmniHub-v${{ steps.version.outputs.version }}-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7
