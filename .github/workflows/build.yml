name: Build OmniSight

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Release erstellen?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Abhaengigkeiten installieren
        run: npm install

      - name: castlabs EVS (WideVine Signatur – optional)
        # Aktivieren sobald CASTLABS_EVS_TOKEN in GitHub Secrets gesetzt ist
        # Anleitung: WIDEVINE_CASTLABS_SETUP.md
        if: ${{ secrets.CASTLABS_EVS_TOKEN != '' }}
        run: npx @castlabs/electron-builder-tools@latest castlabs-evs check
        env:
          CASTLABS_EVS_TOKEN: ${{ secrets.CASTLABS_EVS_TOKEN }}
        continue-on-error: true

      - name: Version auslesen
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT

      - name: Bundle bauen
        run: node scripts/build-bundle.js

      - name: Windows Build (.exe)
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Artifact hochladen (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: OmniSight-v${{ steps.version.outputs.version }}-Windows
          path: dist/*.exe
          if-no-files-found: warn
          retention-days: 3
          overwrite: true

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OmniSight v${{ steps.version.outputs.version }}
          files: |
            dist/*.exe
            dist/latest.yml
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
