name: Build OmniSight

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # KEIN cache: 'npm' → braucht package-lock.json die wir nicht einchecken

      - name: Abhängigkeiten installieren
        run: npm install
        # npm ci würde package-lock.json voraussetzen

      - name: Icons generieren
        run: node scripts/generate-icons.js

      - name: Version auslesen
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT

      - name: App bauen
        run: npm run build

      - name: Alte Artifacts aufräumen (Storage sparen)
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const cutoff = Date.now() - 24 * 60 * 60 * 1000;
            for (const a of artifacts.data.artifacts) {
              if (new Date(a.created_at).getTime() < cutoff) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: a.id
                });
                console.log(`Gelöscht: ${a.name}`);
              }
            }

      - name: Artifact hochladen (nur .exe)
        uses: actions/upload-artifact@v4
        with:
          name: OmniSight-v${{ steps.version.outputs.version }}-Windows
          path: dist/*.exe
          if-no-files-found: warn
          retention-days: 3
          overwrite: true

      # Nur bei Tag-Push: GitHub Release + Auto-Update
      - name: GitHub Release erstellen (nur bei Tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/latest.yml
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
