name: Build OmniSight

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # nötig für artifact-delete

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Icons generieren
        run: node scripts/generate-icons.js

      - name: Version auslesen
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT

      - name: App bauen (.exe) – kein Auto-Publish
        run: npm run build

      # Alte Artifacts löschen um Storage zu sparen (kostet sonst nach 0,5 GB)
      - name: Alte Artifacts aufräumen
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            const cutoff = Date.now() - 24 * 60 * 60 * 1000; // 24h alt
            for (const a of artifacts.data.artifacts) {
              if (new Date(a.created_at).getTime() < cutoff) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: a.id
                });
                console.log(`Gelöscht: ${a.name} (${a.id})`);
              }
            }

      - name: Artifact hochladen (nur .exe, KEINE blockmap)
        uses: actions/upload-artifact@v4
        with:
          name: OmniSight-v${{ steps.version.outputs.version }}-Windows
          path: dist/*.exe
          if-no-files-found: warn
          retention-days: 1      # nach 1 Tag automatisch gelöscht → spart Storage
          compression-level: 6
          overwrite: true        # alten gleichen Namen überschreiben

      # Nur bei echtem Tag-Push: GitHub Release erstellen
      - name: GitHub Release erstellen (nur bei Tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe      # keine blockmap im Release
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
