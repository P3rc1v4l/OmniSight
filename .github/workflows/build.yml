name: Build OmniSight

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Icons generieren
        run: node scripts/generate-icons.js

      - name: Version auslesen
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT

      - name: Windows Build (.exe)
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Code-Signing nur aktiv wenn Secrets gesetzt (scripts/create-cert.ps1)
          # Leer lassen = kein Signing, SmartScreen-Warnung beim ersten Start
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Alte Artifacts aufräumen
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner, repo: context.repo.repo, per_page: 100
            });
            const cutoff = Date.now() - 24 * 60 * 60 * 1000;
            for (const a of artifacts.data.artifacts) {
              if (new Date(a.created_at).getTime() < cutoff) {
                try {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner, repo: context.repo.repo, artifact_id: a.id
                  });
                } catch(e) { console.log('Skip:', e.message); }
              }
            }

      - name: Artifact hochladen (nur .exe)
        uses: actions/upload-artifact@v4
        with:
          name: OmniSight-v${{ steps.version.outputs.version }}-Windows
          path: dist/*.exe
          if-no-files-found: warn
          retention-days: 3
          overwrite: true

      # Nur bei Tag v* → GitHub Release + latest.yml für Auto-Update
      - name: GitHub Release erstellen
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
