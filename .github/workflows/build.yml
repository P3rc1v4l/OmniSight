name: Build OmniSight

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Icons generieren
        run: node scripts/generate-icons.js

      - name: Version auslesen
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT

      - name: App bauen (.exe) – kein Auto-Publish
        run: npm run build
        # GH_TOKEN wird NICHT gesetzt → --publish never verhindert Fehler

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: OmniSight-v${{ steps.version.outputs.version }}-Windows
          path: |
            dist/*.exe
            dist/*.exe.blockmap
          if-no-files-found: warn

      # Nur bei echtem Tag-Push: GitHub Release erstellen
      - name: GitHub Release erstellen (nur bei Tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
