# ═══════════════════════════════════════════════════════════════════
# OmniHub – GitHub Actions Build & Release
# Trigger: Manuell über workflow_dispatch ODER Tag v*
# ═══════════════════════════════════════════════════════════════════

name: Build & Release OmniHub

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'GitHub-Release erstellen?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────
      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ── Rust (stable) ───────────────────────────────────────────────
      - name: Rust stable installieren
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── Rust-Cache ──────────────────────────────────────────────────
      - name: Rust-Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      # ── Node-Abhängigkeiten ─────────────────────────────────────────
      - name: Node-Abhängigkeiten installieren
        run: npm ci

      # ── Version auslesen ────────────────────────────────────────────
      - name: Version auslesen
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "Baue OmniHub v$ver..."

      # ── Tauri Build ─────────────────────────────────────────────────
      - name: Tauri Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY:   ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD:  ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName:        v${{ steps.version.outputs.version }}
          releaseName:    'OmniHub v${{ steps.version.outputs.version }}'
          releaseBody:    |
            ## OmniHub v${{ steps.version.outputs.version }}

            ### Installation
            Lade die `.exe`-Datei herunter und führe sie aus.

            ### Hinweise
            - **WideVine**: Ist durch Edge WebView bereits eingebaut – kein manueller Setup nötig
            - Bei Problemen: [Discord](https://discord.gg/tnfgta33uj) oder [GitHub Issues](https://github.com/P3rc1v4l/OmniHub/issues)
          releaseDraft:   false
          prerelease:     false
          includeUpdaterJson: true
          createTag: ${{ startsWith(github.ref, 'refs/tags/v') == false }}
        # Release nur wenn Tag vorhanden ODER create_release == true
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'

      # ── Artefakte hochladen (ohne Release) ─────────────────────────
      - name: Artefakte hochladen
        if: github.event.inputs.create_release == 'false' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: OmniHub-v${{ steps.version.outputs.version }}-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7
