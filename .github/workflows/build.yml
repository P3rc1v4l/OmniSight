name: Build OmniSight

on:
  # NUR manueller Start oder Tag-Push – kein Auto-Trigger bei normalem Commit!
  workflow_dispatch:
    inputs:
      reason:
        description: 'Grund für den Build (optional)'
        required: false
        default: 'Manueller Build'
  push:
    tags:
      - 'v*'   # Automatisch nur bei versionierten Tags (v3.1.4 etc.)

permissions:
  contents: write
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Abhängigkeiten installieren
        run: npm install

      # Icons NICHT bei jedem Build generieren
      # Nur manuell ausfuehren wenn Logo geaendert: node scripts/generate-icons.js

      - name: Version auslesen
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT

      - name: Windows Build (.exe)
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Alte Artifacts aufräumen
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner, repo: context.repo.repo, per_page: 100
            });
            const cutoff = Date.now() - 24 * 60 * 60 * 1000;
            for (const a of artifacts.data.artifacts) {
              if (new Date(a.created_at).getTime() < cutoff) {
                try {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner, repo: context.repo.repo, artifact_id: a.id
                  });
                } catch(e) {}
              }
            }

      - name: Artifact hochladen (nur .exe)
        uses: actions/upload-artifact@v4
        with:
          name: OmniSight-v${{ steps.version.outputs.version }}-Windows
          path: dist/*.exe
          if-no-files-found: warn
          retention-days: 3
          overwrite: true

      # Release nur bei Tag-Push
      - name: GitHub Release erstellen
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
