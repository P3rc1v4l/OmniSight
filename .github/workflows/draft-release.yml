name: Release-Draft vorbereiten

# Läuft nach jedem erfolgreichen Build auf main
on:
  workflow_run:
    workflows: ["Build OmniSight"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  draft:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version auslesen
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Release-Draft erstellen oder aktualisieren
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const tag = `v${version}`;
            
            // Prüfen ob Draft bereits existiert
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 10
            });
            const existing = releases.data.find(r => r.draft && r.tag_name === tag);
            
            if (existing) {
              console.log(`Draft v${version} bereits vorhanden (ID: ${existing.id})`);
            } else {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `OmniSight v${version}`,
                body: `## OmniSight v${version}\n\n> ✏️ Beschreibung hier eintragen, dann "Publish release" klicken.\n\nSiehe [CHANGELOG.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CHANGELOG.md) für alle Änderungen.`,
                draft: true,
                prerelease: false
              });
              console.log(`✓ Release-Draft v${version} erstellt`);
            }
