# Hält Abhängigkeiten automatisch aktuell und öffnet dafür Pull Requests.
# OmniSight hat drei "Ökosysteme": npm (Frontend), Cargo (Rust-Backend) und die
# Versionen der GitHub-Actions selbst.
version: 2
updates:
  # --- Frontend (SvelteKit, Tauri-JS-Plugins, Tailwind …) ---
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "npm"
    groups:
      # Kleinere/Patch-Updates gebündelt, damit nicht 10 einzelne PRs entstehen
      minor-and-patch:
        update-types: ["minor", "patch"]

  # --- Rust-Backend (Tauri, reqwest, tokio …) ---
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "cargo"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # --- GitHub-Actions im Release-Workflow ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
